server.port=8080

spring.application.name=hacksys-backend

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Chaos settings (used by @Value in services)
app.chaos.intermittent-failure-rate=0.25
app.payment.timeout-ms=3000

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100

# Observability behaviour
app.chaos.noise-ratio=0.75
app.chaos.cascade-enabled=true
app.chaos.timestamp-skew-ms=300     
app.chaos.blind-spot-enabled=true
